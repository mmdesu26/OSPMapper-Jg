name: osp-mapper-jagonet

networks:
  osp_net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  minio_data:

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: osp_jagonet_nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [frontend, backend]
    networks: [osp_net]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
    container_name: osp_jagonet_frontend
    environment:
      NEXT_PUBLIC_API_URL: /api/v1
    depends_on: [backend]
    networks: [osp_net]
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: osp_jagonet_backend
    environment:
      NODE_ENV: production
      DB_SYNC: 'true'
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-osp_mapper_jagonet}
      DB_USER: ${MYSQL_USER:-osp_user}
      DB_PASS: ${MYSQL_PASSWORD:-osp_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET:  ${JWT_ACCESS_SECRET:-change_me_access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh}
      FRONTEND_URL: http://${SERVER_IP:-localhost}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [osp_net]
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: osp_jagonet_mysql
    environment:
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-osp_mapper_jagonet}
      MYSQL_USER:          ${MYSQL_USER:-osp_user}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-osp_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    networks: [osp_net]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: osp_jagonet_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks: [osp_net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: osp_jagonet_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio_password}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9001:9001"
    networks: [osp_net]
    restart: unless-stopped
